name: LLM evaluation

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task name (matches task/* branch or recent merge)'
        required: true
        type: string
      branch:
        description: 'Branch to evaluate (default: main)'
        required: false
        default: 'main'
        type: string

jobs:
  llm-evaluate:
    name: LLM acceptance criteria evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine task name
        id: task
        run: |
          TASK="${{ inputs.task }}"
          if [ -z "$TASK" ]; then
            TASK=$(git log --oneline -20 | grep -oP "task/\K[^\s]+" | head -1 || echo "")
          fi
          if [ -z "$TASK" ]; then
            echo "No task name found — skipping"
            exit 0
          fi
          echo "name=$TASK" >> "$GITHUB_OUTPUT"

      - name: Set up evaluation branch
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git checkout -b task/${{ steps.task.outputs.name }} HEAD 2>/dev/null || true

      - name: Run LLM evaluation
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: claude-haiku-4-5-20251001
          EVAL_THRESHOLD: '90'
        run: bash scripts/evaluate.sh ${{ steps.task.outputs.name }} --llm

      - name: Upload LLM results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-results-${{ steps.task.outputs.name }}
          path: .worktrees/results-${{ steps.task.outputs.name }}.json
          retention-days: 90

      - name: Open follow-up issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULTS=$(cat .worktrees/results-${{ steps.task.outputs.name }}.json 2>/dev/null || echo '{}')
          SCORE=$(echo "$RESULTS" | node -e "const r=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(r.composite_pass_rate ?? 'unknown')")
          gh issue create \
            --title "LLM evaluation below threshold: ${{ steps.task.outputs.name }} (score: $SCORE)" \
            --body "Nightly LLM evaluation for task \`${{ steps.task.outputs.name }}\` scored below the 90% threshold.

          **Composite score:** $SCORE
          **Results:** See Actions run artifacts.

          Review \`holdout/${{ steps.task.outputs.name }}/scenarios.md\` and open a follow-up fix task." \
            --label "validation-failure"
