name: Spec dispatch

on:
  push:
    branches: [main]
    paths: ['specs/**']

permissions:
  contents: write
  issues: write

jobs:
  dispatch:
    name: Dispatch ready specs to GitHub Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Find and dispatch ready specs
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/spec-dispatch.js

      - name: Commit dispatch updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add specs/
          if git diff --cached --quiet; then
            echo "No specs were dispatched — nothing to commit"
          else
            git commit -m "chore: dispatch ready specs [skip ci]"
            git push
          fi
